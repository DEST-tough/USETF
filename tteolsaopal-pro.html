<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e14">
<title>떨사오팔Pro 전략 추천</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap');

:root {
  --bg:      #0a0e14;
  --bg2:     #0f1520;
  --bg3:     #151d2b;
  --border:  #1e2d42;
  --border2: #263548;
  --text:    #c4d4e8;
  --muted:   #4a6280;
  --dim:     #2a3d55;
  --pro1:    #38bdf8;
  --pro2:    #34d399;
  --pro3:    #f97316;
  --gold:    #fbbf24;
  --red:     #f43f5e;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'IBM Plex Sans KR', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  padding: 0;
  overflow-x: hidden;
}

/* 스캔라인 오버레이 */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

.container { max-width: 680px; margin: 0 auto; padding: 16px; }

/* ── 헤더 ── */
header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.logo {
  font-family: var(--mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
}
.logo-main {
  font-size: 22px; font-weight: 600;
  color: #fff; letter-spacing: -0.5px;
  line-height: 1.2; margin-top: 2px;
}
.logo-main span { color: var(--gold); }
.header-right { text-align: right; }
.last-update { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
.refresh-btn {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); font-family: var(--mono);
  font-size: 11px; padding: 7px 14px; cursor: pointer;
  transition: all .15s;
  letter-spacing: 1px;
}
.refresh-btn:hover { border-color: var(--gold); color: var(--gold); }
.refresh-btn:disabled { opacity: .4; cursor: not-allowed; }
.refresh-btn.loading { animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

/* ── 상태 표시 ── */
.status-bar {
  font-size: 11px; color: var(--muted);
  padding: 8px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.status-dot.ok { background: var(--pro2); box-shadow: 0 0 6px var(--pro2); }
.status-dot.err { background: var(--red); }
.status-dot.loading { background: var(--gold); animation: pulse 1s infinite; }

/* ── 현재 지표 ── */
.section-title {
  font-size: 10px; letter-spacing: 3px;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 12px;
}

.indicators-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  margin-bottom: 20px;
}
.ind-card {
  background: var(--bg2); border: 1px solid var(--border);
  padding: 10px 12px;
}
.ind-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.ind-value { font-size: 16px; font-weight: 600; color: #fff; }
.ind-value.pos { color: var(--pro2); }
.ind-value.neg { color: var(--red); }
.ind-value.align-ok { color: var(--pro2); font-size: 13px; }
.ind-value.align-no { color: var(--red); font-size: 13px; }

/* ── 분석 구간 ── */
.analysis-range {
  font-size: 11px; color: var(--muted);
  padding: 8px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  margin-bottom: 20px;
}
.analysis-range span { color: var(--text); }

/* ── Top3 유사 구간 ── */
.similar-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

.similar-card {
  background: var(--bg2); border: 1px solid var(--border);
  padding: 14px;
}
.similar-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.similar-rank {
  font-size: 10px; letter-spacing: 2px; color: var(--muted);
  background: var(--bg3); padding: 2px 8px;
}
.similar-period { font-size: 12px; font-weight: 600; color: #fff; }
.similar-score {
  font-size: 13px; font-weight: 600; color: var(--gold);
}

.similar-inds {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.si-item { font-size: 10px; }
.si-label { color: var(--muted); }
.si-val { color: var(--text); font-weight: 500; }

.similar-perf {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.perf-item { font-size: 11px; }
.perf-name {
  font-size: 9px; letter-spacing: 1px; color: var(--muted);
  text-transform: uppercase; margin-bottom: 2px;
}
.perf-vals { display: flex; flex-direction: column; gap: 1px; }
.perf-ret { font-weight: 600; }
.perf-ret.pos { color: var(--pro2); }
.perf-ret.neg { color: var(--red); }
.perf-mdd { font-size: 10px; color: var(--red); }

/* ── 전략 점수 ── */
.scores-section { margin-bottom: 20px; }
.scores-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

.score-card {
  background: var(--bg2); border: 1px solid var(--border);
  padding: 14px 12px; text-align: center;
  position: relative; overflow: hidden;
  transition: border-color .2s;
}
.score-card.winner {
  border-color: var(--gold);
  background: linear-gradient(135deg, #1a1500 0%, var(--bg2) 60%);
}
.score-card.winner::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--gold);
}
.score-card.excluded { opacity: .4; }

.score-pro-name {
  font-size: 10px; letter-spacing: 2px; color: var(--muted);
  text-transform: uppercase; margin-bottom: 6px;
}
.score-card.winner .score-pro-name { color: var(--gold); }
.score-value {
  font-size: 24px; font-weight: 600; color: #fff;
  margin-bottom: 4px;
}
.score-card.winner .score-value { color: var(--gold); }
.score-rank { font-size: 10px; color: var(--dim); }
.score-excluded-note { font-size: 9px; color: var(--red); margin-top: 4px; }

/* ── 추천 결과 ── */
.recommendation {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 20px;
  position: relative; overflow: hidden;
}
.recommendation::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 4px; height: 100%;
}
.recommendation.pro1::before { background: var(--pro1); }
.recommendation.pro2::before { background: var(--pro2); }
.recommendation.pro3::before { background: var(--pro3); }

.rec-label {
  font-size: 10px; letter-spacing: 3px; color: var(--muted);
  text-transform: uppercase; margin-bottom: 8px;
}
.rec-date { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
.rec-name {
  font-size: 32px; font-weight: 600; letter-spacing: -1px;
  margin-bottom: 16px;
}
.recommendation.pro1 .rec-name { color: var(--pro1); }
.recommendation.pro2 .rec-name { color: var(--pro2); }
.recommendation.pro3 .rec-name { color: var(--pro3); }

.rec-params {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.rec-tag {
  font-size: 10px; padding: 4px 10px;
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); letter-spacing: 0.5px;
}

/* ── 로딩 스켈레톤 ── */
.skeleton {
  background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border: 1px solid var(--border);
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── 에러 ── */
.error-box {
  background: #1a0810; border: 1px solid #4a1830;
  padding: 14px; font-size: 12px; color: #f87171;
  margin-bottom: 16px;
}

/* ── footer ── */
footer {
  border-top: 1px solid var(--border);
  padding-top: 16px; margin-top: 8px;
  font-size: 10px; color: var(--muted);
  line-height: 1.8;
}

/* ── 유틸 ── */
.hidden { display: none !important; }
.text-pos { color: var(--pro2); }
.text-neg { color: var(--red); }
.text-muted { color: var(--muted); }
</style>
</head>

<div class="container">

  <!-- 헤더 -->
  <header>
    <div>
      <div class="logo">SOXL · 전략 추천 시스템</div>

</div>

function calcMA(closes, n) {
  if (closes.length < n) return null;
  return closes.slice(-n).reduce((a,b)=>a+b,0) / n;
}

function calcRSI(closes, n=14) {
  // Wilder Smoothed RSI (워밍업 n*3 필요)
  if (closes.length < n*3) return null;
  let gains=0, losses=0;
  for (let i=1; i<=n; i++) {
    const d=closes[i]-closes[i-1];
    if (d>0) gains+=d; else losses-=d;
  }
  let avgG=gains/n, avgL=losses/n;
  for (let i=n+1; i<closes.length; i++) {
    const d=closes[i]-closes[i-1];
    avgG=(avgG*(n-1)+(d>0?d:0))/n;
    avgL=(avgL*(n-1)+(d<0?-d:0))/n;
  }
  if (avgL===0) return 100;
  return 100-100/(1+avgG/avgL);
}

function calcROC(closes, n=12) {
  if (closes.length < n+1) return null;
  const old = closes[closes.length-1-n];
  const cur = closes[closes.length-1];
  return (cur - old) / old * 100;
}

    logRets.push(Math.log(closes[i]/closes[i-1]));
  }
  const mean = logRets.reduce((a,b)=>a+b,0)/n;
  const variance = logRets.reduce((a,b)=>a+(b-mean)**2,0)/(n-1);
  return Math.sqrt(variance) * Math.sqrt(n); // ×sqrt(20) 스케일
}

function calcSlope(closes, maN=20, slopeN=10) {
  // MA20의 10일 기울기: (현재MA20 - 10일전MA20) / 10일전MA20 × 100
  if (closes.length < maN + slopeN) return null;
  const curMA  = closes.slice(-maN).reduce((a,b)=>a+b,0)/maN;
  const prevMA = closes.slice(-maN-slopeN, -slopeN).reduce((a,b)=>a+b,0)/maN;
  return (curMA - prevMA) / prevMA * 100;
}

function calcIndicators(closes) {
  const ma20  = calcMA(closes, 20);
  const ma60  = calcMA(closes, 60);
  const slope = calcSlope(closes);
  const dist  = ma20 ? (closes[closes.length-1] - ma20) / ma20 * 100 : null;
  const rsi   = calcRSI(closes);
  const roc   = calcROC(closes);
  const vol   = calcVol(closes);
  const align = (ma20 && ma60) ? ma20 > ma60 : null;
  return { ma20, ma60, slope, dist, rsi, roc, vol, align };
}

// ════════════════════════════════════════════════════════════════
// 유사도 계산
// ════════════════════════════════════════════════════════════════
function calcSimilarity(cur, past) {
  // 정배열 불일치 → 큰 패널티
  const alignPenalty = (cur.align !== past.align) ? 5.0 : 0;
  const sim = SIM.C
    - SIM.slope * Math.abs(cur.slope - past.slope)
    - SIM.dist  * Math.abs(cur.dist  - past.dist)
    - SIM.rsi   * Math.abs(cur.rsi   - past.rsi)
    - SIM.roc   * Math.abs(cur.roc   - past.roc)
    - SIM.vol   * Math.abs((cur.vol - past.vol) * 100)
    - alignPenalty;
  return sim;
}

// ════════════════════════════════════════════════════════════════
// 전략 성과 계산 (특정 구간에서 Pro1/2/3 수익률·MDD)
// ════════════════════════════════════════════════════════════════
function calcStratPerf(closesSlice, cfg) {
  const capital = 10000;
  let cash = capital;
  const slots = new Array(6).fill(null);
  let peak = capital;
  let mdd = 0;

  for (let i=1; i<closesSlice.length; i++) {
    const price = closesSlice[i];
    const prev  = closesSlice[i-1];

    // 매도/손절
    for (let s=0; s<6; s++) {
      const slot = slots[s];
      if (!slot) continue;
      const hold = i - slot.day;
      if (hold >= cfg.stopDays) {
        cash += slot.shares * price;
        slots[s] = null;
      } else if (price >= slot.avgPrice * (1 + cfg.sellThr)) {
        cash += slot.shares * price;
        slots[s] = null;
      }
    }

    // 매수
    if (price <= prev * (1 + cfg.buyThr)) {
      for (let s=0; s<6; s++) {
        if (!slots[s]) {
          const alloc = capital * cfg.weights[s];
          if (cash >= alloc * 0.999) {
            slots[s] = { shares: alloc/price, avgPrice: price, cost: alloc, day: i };
            cash -= alloc;
          }
          break;
        }
      }
    }

    const holdings = slots.reduce((a,sl) => a + (sl ? sl.shares*price : 0), 0);
    const pv = cash + holdings;
    if (pv > peak) peak = pv;
    const dd = (pv - peak) / peak * 100;
    if (dd < mdd) mdd = dd;
  }

  const holdings = slots.reduce((a,sl) => a + (sl ? sl.shares*closesSlice[closesSlice.length-1] : 0), 0);
  const finalPV = cash + holdings;
  const ret = (finalPV / capital - 1) * 100;
  return { ret: +ret.toFixed(1), mdd: +mdd.toFixed(1) };
}

// ════════════════════════════════════════════════════════════════
// 점수 계산
// ════════════════════════════════════════════════════════════════
function calcScore(top3Results) {
  // top3Results: [{Pro1:{ret,mdd}, Pro2:{ret,mdd}, Pro3:{ret,mdd}}, ...]
  const scores = { Pro1: 0, Pro2: 0, Pro3: 0 };
  for (const r of top3Results) {
    for (const k of ['Pro1','Pro2','Pro3']) {
      scores[k] += r[k].ret * Math.exp(r[k].mdd * SCORE_W);
    }
  }
  return { Pro1: +(scores.Pro1/3).toFixed(3), Pro2: +(scores.Pro2/3).toFixed(3), Pro3: +(scores.Pro3/3).toFixed(3) };
}

// ════════════════════════════════════════════════════════════════
// 메인 분석 함수
// ════════════════════════════════════════════════════════════════
function setStatus(type, msg) {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className  = 'status-dot ' + type;
  text.textContent = msg;
}

function fmt(v, decimals=2) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  const s = v.toFixed(decimals);
  return v > 0 ? '+' + s : s;
}

async function runAnalysis() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '⏳ 분석 중...';
  document.getElementById('mainContent').classList.add('hidden');
  document.getElementById('errorBox').classList.add('hidden');
  setStatus('loading', '야후파이낸스 데이터 수신 중...');

  try {
    // ── 1. 야후파이낸스에서 최신 SOXL 데이터 수신 ──
    const res = await fetch('/yahoo?symbol=SOXL&range=1y&interval=1d');
    if (!res.ok) throw new Error('야후파이낸스 응답 오류: ' + res.status);
    const json = await res.json();
    const result = json?.chart?.result?.[0];
    if (!result) throw new Error('데이터 파싱 실패');

    const timestamps = result.timestamp;
    const liveCloses = result.indicators.quote[0].close;

    // null 제거
    const livePairs = timestamps.map((t,i) => ({ t, c: liveCloses[i] }))
                                .filter(x => x.c != null);

    if (livePairs.length < 100) throw new Error('데이터 부족 (최소 100거래일 필요)');

    // 마지막 거래일
    const lastTs  = livePairs[livePairs.length-1].t;
    const lastDate = new Date(lastTs * 1000);
    const lastDateStr = lastDate.toISOString().slice(0,10);

    // ── 2. 지표 계산용 종가 배열 구성 ──
    // HIST 데이터 뒤에 야후 최신 데이터를 이어붙여 완전한 배열 생성
    const liveClosesArr = livePairs.map(x => x.c);

    // HIST 마지막 날짜 이후의 야후 데이터만 추가
    const histLastDate = HIST_DATES[HIST_DATES.length - 1];
    const histLastTs   = new Date(histLastDate + 'T00:00:00Z').getTime() / 1000;
    const newLivePairs = livePairs.filter(x => x.t > histLastTs + 3600);
    const mergedCloses = [...HIST_CLOSES, ...newLivePairs.map(x => x.c)];

    // 지표 계산 (최신 종가 기준 충분한 길이 = 150일)
    const inds = calcIndicators(mergedCloses.slice(-150));
    if (inds.slope === null || inds.rsi === null) throw new Error('지표 계산 실패 (데이터 부족)');

    setStatus('loading', `과거 유사 구간 탐색 중... (${HIST_DATES.length}일 검색)`);
    await new Promise(r => setTimeout(r, 10)); // UI 업데이트 허용

    // ── 3. 과거 데이터에서 유사도 Top3 탐색 ──
    const WINDOW = 22;   // 유사구간 길이 (약 1달 거래일)
    const GAP    = 22;   // 성과 확인 기간
    const HIST_LEN = HIST_DATES.length;
    const WARMUP   = 149; // 지표 계산 최소 워밍업

    const candidates = [];

    for (let i = WARMUP; i < HIST_LEN - GAP; i++) {
      const pastCloses = HIST_CLOSES.slice(Math.max(0, i - WARMUP), i + 1);
      if (pastCloses.length < 100) continue;

      const pastInds = calcIndicators(pastCloses);
      if (pastInds.slope === null || pastInds.rsi === null) continue;

      const sim = calcSimilarity(inds, pastInds);
      if (sim < 82) continue;

      candidates.push({
        endIdx:   i,
        startIdx: Math.max(0, i - WINDOW + 1),
        sim:      +sim.toFixed(2),
        inds:     pastInds,
        date:     HIST_DATES[i],
      });
    }

    // 유사도 내림차순, 겹치는 구간(WINDOW 이내) 제거 → Top3
    candidates.sort((a, b) => b.sim - a.sim);
    const top3 = [];
    for (const c of candidates) {
      if (!top3.some(t => Math.abs(t.endIdx - c.endIdx) < WINDOW)) {
        top3.push(c);
        if (top3.length === 3) break;
      }
    }

    if (top3.length < 3) throw new Error(`유사 구간 부족 (${top3.length}개 발견, 최소 3개 필요)`);

    setStatus('loading', '전략 성과 시뮬레이션 중...');

    // ── 4. Top3 각 구간에서 전략 성과 계산 ──
    const top3Results = top3.map(t => {
      const perfCloses = HIST_CLOSES.slice(t.endIdx, Math.min(t.endIdx + GAP + 1, HIST_LEN));
      const perfStart  = HIST_DATES[t.endIdx];
      const perfEnd    = HIST_DATES[Math.min(t.endIdx + GAP, HIST_LEN-1)];
      return {
        period: HIST_DATES[t.startIdx] + ' ~ ' + t.date,
        perfPeriod: perfStart + ' ~ ' + perfEnd,
        sim: t.sim,
        inds: t.inds,
        Pro1: calcStratPerf(perfCloses, STRATEGIES.Pro1),
        Pro2: calcStratPerf(perfCloses, STRATEGIES.Pro2),
        Pro3: calcStratPerf(perfCloses, STRATEGIES.Pro3),
      };
    });

    // ── 5. 점수 계산 ──
    const scores = calcScore(top3Results);

    // 정배열 여부 (Pro1 제외 조건)
    const isAligned = inds.align;

    // 최고점 전략 (정배열 아니면 Pro1 제외)
    const validKeys = isAligned ? ['Pro1','Pro2','Pro3'] : ['Pro2','Pro3'];
    // Pro1이 정배열 아닐 때 점수표에는 표시하되 추천에서만 제외
    const bestKey = validKeys.reduce((a,b) => scores[a] > scores[b] ? a : b);

    // 분석 기준일 (야후파이낸스 마지막 거래일 + 1영업일)
    const recDate = nextBusinessDay(lastDateStr);

    // ── 6. UI 렌더링 ──
    renderAnalysis({
      lastDate: lastDateStr,
      recDate,
      inds,
      top3: top3Results,
      scores,
      bestKey,
      isAligned,
    });

    setStatus('ok', `분석 완료 — 기준일 ${lastDateStr} 데이터 기반`);
    document.getElementById('lastUpdate').textContent = '마지막 갱신: ' + new Date().toLocaleString('ko-KR');
    document.getElementById('mainContent').classList.remove('hidden');

  } catch (e) {
    setStatus('err', '오류 발생: ' + e.message);
    const eb = document.getElementById('errorBox');
    eb.textContent = '오류: ' + e.message;
    eb.classList.remove('hidden');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = '▶ 분석 실행';
  }
}

function nextBusinessDay(dateStr) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + 1);
  while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0,10);
}

// ════════════════════════════════════════════════════════════════
// UI 렌더링
// ════════════════════════════════════════════════════════════════
function renderAnalysis({ lastDate, recDate, inds, top3, scores, bestKey, isAligned }) {
  // 분석 구간 (최근 22거래일)
  const liveStart = new Date(lastDate);
  liveStart.setDate(liveStart.getDate() - 31); // 약 22거래일 = 달력 31일
  document.getElementById('analysisRange').innerHTML =
    `<span>추천 기준일:</span> <span style="color:#fff;font-weight:600">${recDate}</span> &nbsp;|&nbsp; ` +
    `<span>분석 구간 (약 1달):</span> <span>${liveStart.toISOString().slice(0,10)} ~ ${lastDate}</span>`;

  // 지표 카드
  const ig = document.getElementById('indicatorsGrid');
  ig.innerHTML = [
    { label:'정배열(20ma>60ma)', value: inds.align ? '✓ 정배열' : '✗ 역배열', cls: inds.align ? 'align-ok' : 'align-no' },
    { label:'기울기(20ma 10일)', value: fmt(inds.slope,2)+'%', cls: inds.slope>0?'pos':'neg' },
    { label:'이격도(주가/20ma)', value: fmt(inds.dist,2)+'%', cls: inds.dist>0?'pos':'neg' },
    { label:'RSI(14)',           value: inds.rsi.toFixed(2), cls: '' },
    { label:'ROC(12)',           value: fmt(inds.roc,2)+'%', cls: inds.roc>0?'pos':'neg' },
    { label:'변동성(20day)',     value: inds.vol.toFixed(4), cls: '' },
  ].map(({label,value,cls}) =>
    `<div class="ind-card">
      <div class="ind-label">${label}</div>
      <div class="ind-value ${cls}">${value}</div>
    </div>`
  ).join('');

  // Top3 유사구간
  const sl = document.getElementById('similarList');
  sl.innerHTML = top3.map((t,i) =>
    `<div class="similar-card">
      <div class="similar-header">
        <div>
          <div class="similar-rank">TOP ${i+1}</div>
          <div class="similar-period">${t.period}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">성과 확인: ${t.perfPeriod}</div>
        </div>
        <div class="similar-score">${t.sim.toFixed(2)}%</div>
      </div>
      <div class="similar-inds">
        <div class="si-item"><div class="si-label">정배열</div><div class="si-val">${t.inds.align ? '✓' : '✗'}</div></div>
        <div class="si-item"><div class="si-label">기울기20</div><div class="si-val">${fmt(t.inds.slope,2)}%</div></div>
        <div class="si-item"><div class="si-label">이격도20</div><div class="si-val">${fmt(t.inds.dist,2)}%</div></div>
        <div class="si-item"><div class="si-label">RSI</div><div class="si-val">${t.inds.rsi.toFixed(2)}</div></div>
        <div class="si-item"><div class="si-label">ROC</div><div class="si-val">${fmt(t.inds.roc,2)}%</div></div>
        <div class="si-item"><div class="si-label">변동성</div><div class="si-val">${t.inds.vol.toFixed(4)}</div></div>
      </div>
      <div class="similar-perf">
        ${['Pro1','Pro2','Pro3'].map(k => {
          const p = t[k];
          return `<div class="perf-item">
            <div class="perf-name">${k}</div>
            <div class="perf-vals">
              <div class="perf-ret ${p.ret>=0?'pos':'neg'}">${fmt(p.ret,1)}%</div>
              <div class="perf-mdd">MDD ${fmt(p.mdd,1)}%</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`
  ).join('');

  // 점수 카드
  const sg = document.getElementById('scoresGrid');
  const sortedKeys = ['Pro1','Pro2','Pro3'].sort((a,b) => scores[b]-scores[a]);
  sg.innerHTML = ['Pro1','Pro2','Pro3'].map(k => {
    const isWinner = k === bestKey;
    const isExcluded = !isAligned && k === 'Pro1';
    const rank = sortedKeys.indexOf(k) + 1;
    return `<div class="score-card ${isWinner?'winner':''} ${isExcluded?'excluded':''}">
      <div class="score-pro-name">${k}</div>
      <div class="score-value">${scores[k].toFixed(3)}</div>
      <div class="score-rank">${isExcluded ? '' : rank+'위'}</div>
      ${isExcluded ? '<div class="score-excluded-note">정배열 아님 → 제외</div>' : ''}
    </div>`;
  }).join('');

  // 추천 결과
  const s = STRATEGIES[bestKey];
  const rb = document.getElementById('recommendationBox');
  rb.innerHTML = `<div class="recommendation ${bestKey.toLowerCase()}">
    <div class="rec-label">추천 전략</div>
    <div class="rec-date">${recDate}</div>
    <div class="rec-name">떨사오팔 ${bestKey}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">분할 비율: ${s.weights_str} / 예비티어</div>
    <div class="rec-params">
      ${s.params.map(p => `<span class="rec-tag">${p}</span>`).join('')}
    </div>
  </div>`;
}
