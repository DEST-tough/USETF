<script>

  assets:[{t:"QQQM",w:.20},{t:"SCHG",w:.15},{t:"MTUM",w:.15},{t:"XLK",w:.12},
          {t:"SOXQ",w:.08},{t:"QLD",w:.10},{t:"SSO",w:.08},
          {t:"JEPI",w:.06},{t:"GPIQ",w:.06}]};

          {t:"MLPX",w:.06},{t:"GPIQ",w:.05},{t:"JEPI",w:.03},{t:"XLK",w:.04},
          {t:"SOXX",w:.02},{t:"SPLG",w:.05},{t:"GLDM",w:.03}]};

var RS_CONFIGS = [
  {rs:0,label:"극안전",w1:.05,w2:.60,w3:.35,color:"#34d399"},
  {rs:1,label:"안전",  w1:.10,w2:.55,w3:.35,color:"#22d3ee"},
  {rs:2,label:"경고",  w1:.20,w2:.45,w3:.35,color:"#fbbf24"},
  {rs:3,label:"위험",  w1:.50,w2:.15,w3:.35,color:"#f87171"},
  {rs:4,label:"긴급",  w1:.70,w2:.05,w3:.25,color:"#ef4444"},
];
var ALL_TICKERS = ["QQQM","SPLG","GLDM","MOAT","QUAL","SCHG","MTUM",
                   "XLK","SOXQ","SSO","QLD","TQQQ","JEPI","GPIQ",
                   "DBMF","IEF","MLPX","SOXX","PDBC"];

// ── Google Sheets URL (배포 후 여기에 입력) ──────────────────
var GS_URL = ""; // 예: "https://script.google.com/macros/s/XXXXX/exec"

// ── 앱 상태 ───────────────────────────────────────────────────
var state = {
  qqqDD:8, vix:18, vixRising:false, mom:2, below200:false, ma200:0, qqqPrice:0,
  manualRS:null, dca:200,
  quantities:{},   // 보유 수량 (소수점)
  prices:{},       // ETF 현재가 캐시 (시장 데이터 조회 시 업데이트)
  dividendsYtd:0
};

// 평가금액 계산: 수량 × 현재가
function getHoldingValue(ticker) {
  var qty = state.quantities[ticker] || 0;
  var price = state.prices[ticker] || 0;
  return qty * price;
}
function getTotalValue() {
  return ALL_TICKERS.reduce(function(sum, t){ return sum + getHoldingValue(t); }, 0);
}

var syncStatus = { msg: "", type: "" }; // ok / err / ing

function setSyncStatus(type, msg) {
  syncStatus = { type: type, msg: msg };
  var el = document.getElementById("sync-msg");
  if (!el) return;
  el.textContent = msg;
  el.style.color = type === "ok" ? "#34d399" : type === "err" ? "#f87171" : "#fbbf24";
  el.style.display = msg ? "block" : "none";
}

function save() {
  try { localStorage.setItem("toss-v3", JSON.stringify({
    quantities:state.quantities, prices:state.prices,
    dca:state.dca, dividendsYtd:state.dividendsYtd,
    qqqDD:state.qqqDD, vix:state.vix, vixRising:state.vixRising,
    mom:state.mom, below200:state.below200, ma200:state.ma200, qqqPrice:state.qqqPrice, manualRS:state.manualRS
  })); } catch(e){}
}

// 명시적 저장 (버튼 클릭 시) - 실제 응답 확인
async function saveToSheet() {
  save(); // localStorage
  setSyncStatus("ing", "저장 중...");
  try {
    var res = await fetch("/gs", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        quantities:   state.quantities,
        prices:       state.prices,
        dca:          state.dca,
        dividendsYtd: state.dividendsYtd,
        qqqDD:        state.qqqDD,
        vix:          state.vix,
        vixRising:    state.vixRising,
        mom:          state.mom,
        below200:     state.below200,
        manualRS:     state.manualRS,
      })
    });
    var text = await res.text();
    var json;
    try { json = JSON.parse(text); } catch(e) {
      throw new Error("응답 파싱 실패: " + text.slice(0,80));
    }
    if (json.ok) {
      var now = new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
      setSyncStatus("ok", "✓ " + now + " 시트에 저장 완료");
    } else {
      throw new Error(json.error || "저장 실패");
    }
  } catch(e) {
    setSyncStatus("err", "저장 실패: " + e.message);
  }
}
function load() {
  try {
    var d = JSON.parse(localStorage.getItem("toss-v3")||"{}");
    if(d.quantities)   state.quantities   = d.quantities;
    if(d.prices)       state.prices       = d.prices;
    if(d.dca)          state.dca          = d.dca;
    if(d.dividendsYtd) state.dividendsYtd = d.dividendsYtd;
    if(d.qqqDD  !== undefined) state.qqqDD     = d.qqqDD;
    if(d.vix    !== undefined) state.vix       = d.vix;
    if(d.vixRising !== undefined) state.vixRising = d.vixRising;
    if(d.mom    !== undefined) state.mom       = d.mom;
    if(d.below200  !== undefined) state.below200  = d.below200;
    if(d.ma200     !== undefined) state.ma200     = d.ma200;
    if(d.qqqPrice  !== undefined) state.qqqPrice  = d.qqqPrice;
    if(d.manualRS  !== undefined) state.manualRS  = d.manualRS;
  } catch(e){}
}

// ── Google Sheets 저장 (내부용 - 응답 무시) ──────────────────
function gsSave() { /* saveToSheet()로 대체됨 */ }

// ── Google Sheets 불러오기 ────────────────────────────────────
async function gsLoad() {

  setSyncStatus("ing", "시트에서 불러오는 중...");
  try {
    var res  = await fetch("/gs?action=read");
    var json = await res.json();
    if (!json.ok) throw new Error(json.error || "응답 오류");
    var d = json.data;
    if (d.quantities)            state.quantities   = d.quantities;
    if (d.prices)                state.prices       = d.prices;
    if (d.dca)                   state.dca          = d.dca;
    if (d.dividendsYtd)          state.dividendsYtd = d.dividendsYtd;
    if (d.qqqDD  !== undefined)  state.qqqDD        = d.qqqDD;
    if (d.vix    !== undefined)  state.vix          = d.vix;
    if (d.vixRising !== undefined) state.vixRising  = d.vixRising;
    if (d.mom      !== undefined) state.mom          = d.mom;
    if (d.below200 !== undefined) state.below200     = d.below200;
    if (d.manualRS !== undefined) state.manualRS     = d.manualRS;
    // 로컬에도 저장
    try { localStorage.setItem("toss-v3", JSON.stringify(d)); } catch(e){}
    var now = new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
    setSyncStatus("ok", "✓ " + now + " 시트에서 불러오기 완료");
    renderAll();
  } catch(e) {
    setSyncStatus("err", "불러오기 실패: " + e.message);
  }
}

function calcRS(dd,vix,rising,mom,below200){
  var s=0;
  if(dd>20)s+=2; else if(dd>12)s+=1;
  if(vix>28)s+=1; else if(vix>22)s+=0.5;
  if(rising)s+=0.5;
  if(mom<-6)s+=1; else if(mom<-3)s+=0.5;
  if(vix>25&&dd>12)s+=1;
  if(below200)s+=0.5;
  if(below200&&dd>8)s+=0.5;
  return Math.min(4,Math.round(s));
}
function calcWeights(cfg){
  var w={};
  [[PORT1,cfg.w1],[PORT2,cfg.w2],[PORT3,cfg.w3]].forEach(function(p){
    p[0].assets.forEach(function(a){ w[a.t]=(w[a.t]||0)+p[1]*a.w; });
  });
  return w;
}
function fmt(v){
  if(v>=1e6) return "$"+(v/1e6).toFixed(2)+"M";
  if(v>=1000) return "$"+(v/1000).toFixed(1)+"K";
  if(v>=1) return "$"+v.toFixed(2);
  return "$"+v.toFixed(4);
}
function portColor(t){
  if(PORT1.assets.find(function(a){return a.t===t;})) return "#38bdf8";
  if(PORT2.assets.find(function(a){return a.t===t;})) return "#fb923c";
  return "#c084fc";
}

// ── Yahoo Finance 직접 호출 ────────────────────────────────────
// corsproxy.io 는 HTML 파일을 직접 로컬/서버에서 열 때 작동
// claude.ai 환경에서는 막힐 수 있음 → 사용자가 로컬 파일로 실행해야 함
async function yahooQuote(symbol) {
  // Netlify Function 프록시 경유 → CORS 문제 없음
  var urls = [
    "/yahoo?symbol=" + encodeURIComponent(symbol),
    // 폴백: allorigins
    "https://api.allorigins.win/get?url=" + encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+symbol+"?interval=1d&range=1y"),
  ];
  var lastErr;
  for(var i=0;i<urls.length;i++){
    try{
      var res = await fetch(urls[i]);
      if(!res.ok) throw new Error("HTTP "+res.status);
      var text = await res.text();
      var raw;
      try{
        var maybe = JSON.parse(text);
        raw = maybe.contents ? JSON.parse(maybe.contents) : maybe;
      } catch(e){ throw new Error("JSON 파싱 실패: "+text.slice(0,60)); }
      if(!raw.chart||!raw.chart.result||!raw.chart.result[0]) throw new Error("데이터 없음");
      var meta   = raw.chart.result[0].meta;
      var closes = raw.chart.result[0].indicators.quote[0].close.filter(function(v){return v!=null;});
      return {meta:meta, closes:closes};
    } catch(e){ lastErr=e; }
  }
  throw new Error("Yahoo 조회 실패: "+lastErr.message);
}

async function fetchMarketData(){
  // QQQ, VIX, ETF 17개 병렬 조회
  var etfSymbols = ALL_TICKERS.map(function(t){
    // QQQM은 Yahoo에서 그대로, 나머지도 동일
    return t;
  });
  var allSymbols = ["QQQ", "%5EVIX"].concat(etfSymbols);
  var results = await Promise.all(allSymbols.map(function(s){
    return yahooQuote(s).catch(function(e){ return null; }); // 개별 실패 허용
  }));
  var qqqData = results[0];
  var vixData = results[1];
  if(!qqqData) throw new Error("QQQ 조회 실패");
  if(!vixData) throw new Error("VIX 조회 실패");
  // ETF 현재가 추출 (실패한 종목은 기존 캐시 유지)
  var etfPrices = Object.assign({}, state.prices); // 기존 캐시 기반
  etfSymbols.forEach(function(t, i){
    var d = results[2 + i];
    if(d && d.meta) etfPrices[t] = +(d.meta.regularMarketPrice || d.closes[d.closes.length-1]).toFixed(4);
  });
  var qqqC = qqqData.closes, vixC = vixData.closes;
  var qqqPrice   = qqqData.meta.regularMarketPrice || qqqC[qqqC.length-1];
  var qqqHigh52w = Math.max.apply(null,qqqC);
  // VIX: closes 배열의 마지막 값을 현재가로 사용 (일관성 보장)
  var vix = vixC[vixC.length-1];

  // VIX 방향: 백테스트와 동일하게 4주MA(20일) vs 8주MA(40일) 비교
  var vix4w = vixC.slice(-20);
  var vix8w = vixC.slice(-40);
  var vix4ma = vix4w.reduce(function(a,b){return a+b;},0) / vix4w.length;
  var vix8ma = vix8w.reduce(function(a,b){return a+b;},0) / vix8w.length;
  var vixTrend = vix4ma > vix8ma * 1.08 ? "rising" : vix4ma < vix8ma * 0.92 ? "falling" : "stable";
  var vix5dAgoVal = vixC.length >= 6 ? vixC[vixC.length-6] : vixC[0]; // 디버그 표시용

  // 12주(약 60거래일) 수익률
  var idx60 = Math.max(0,qqqC.length-61);
  var p60   = qqqC[idx60];
  var mom12w = p60 ? +((qqqPrice/p60-1)*100).toFixed(2) : 0;

  var qqqDD = +Math.max(0,(qqqHigh52w-qqqPrice)/qqqHigh52w*100).toFixed(1);
  var now   = new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});

  return {
    qqqPrice:+qqqPrice.toFixed(2), qqqHigh52w:+qqqHigh52w.toFixed(2),
    qqqDD:qqqDD, vix:+vix.toFixed(1), qqq12wReturn:mom12w,
    vix5dAgo:+vix5dAgoVal.toFixed(1),
    qqq3mAgo:+p60.toFixed(2), mom12wValid:true,
    vixTrend:vixTrend, fetchedAt:now,
    etfPrices:etfPrices,
    // 200일선: 종가 배열 최근 200개 평균 (장중엔 qqqPrice로 비교)
    below200: (function(){
      if(qqqC.length < 20) return false; // 데이터 부족
      var n = Math.min(200, qqqC.length);
      var ma200 = qqqC.slice(-n).reduce(function(a,b){return a+b;},0) / n;
      return qqqPrice < ma200 * 0.98;
    })(),
    ma200: (function(){
      var n = Math.min(200, qqqC.length);
      return +(qqqC.slice(-n).reduce(function(a,b){return a+b;},0) / n).toFixed(2);
    })(),
    qqqDataLen: qqqC.length,
    note:"QQQ $"+Math.round(qqqPrice)+" | 낙폭 "+qqqDD+"% | VIX "+vix.toFixed(1)+"("+vixTrend+") | 12w "+(mom12w>=0?"+":"")+mom12w+"%" + (qqqPrice < (qqqC.slice(-Math.min(200,qqqC.length)).reduce(function(a,b){return a+b;},0)/Math.min(200,qqqC.length))*0.98?" | 200선↓":""),
  };
}

// ── 시장 데이터 불러오기 ──────────────────────────────────────
async function handleFetch(){
  var btn = document.getElementById("fetchBtn");
  btn.disabled=true; btn.textContent="조회 중...";
  document.getElementById("fetch-err").classList.add("hidden");
  document.getElementById("fetch-ok").classList.add("hidden");
  try{
    var d = await fetchMarketData();
    state.qqqDD    = d.qqqDD;
    state.vix      = d.vix;
    state.vixRising= d.vixTrend==="rising";
    state.mom      = d.qqq12wReturn;
    state.below200 = d.below200 || false;
    state.ma200    = d.ma200 || 0;
    state.qqqPrice = d.qqqPrice || 0;
    state.manualRS = null;
    if(d.etfPrices) state.prices = d.etfPrices;
    save();

    // 조회 결과 표시
    document.getElementById("ok-time").textContent = "✓ "+d.fetchedAt+" 조회완료";
    document.getElementById("ok-note").textContent = d.note;
    var debugItems = [
      {k:"QQQ현재가", v:"$"+d.qqqPrice},
      {k:"52주고점",  v:"$"+d.qqqHigh52w},
      {k:"낙폭",      v:d.qqqDD+"%"},
      {k:"VIX",       v:d.vix},
      {k:"VIX방향",   v:d.vixTrend},
      {k:"VIX5일전",  v:d.vix5dAgo||"-"},
      {k:"3개월전QQQ",v:"$"+d.qqq3mAgo},
      {k:"12w수익률", v:(d.qqq12wReturn>=0?"+":"")+d.qqq12wReturn+"%"},
      {k:"200일선MA", v:d.ma200?"$"+d.ma200:"-"},
      {k:"200선하회", v:d.below200?"✅하회":"❌상회"},
      {k:"데이터수", v:d.qqqDataLen+"일"},
    ];
    document.getElementById("debug-row").innerHTML = debugItems.map(function(i){
      return '<div class="debug-cell"><div class="debug-k">'+i.k+'</div><div class="debug-v">'+i.v+'</div></div>';
    }).join("");
    document.getElementById("fetch-ok").classList.remove("hidden");
    renderAll();
  } catch(e){
    var el=document.getElementById("fetch-err");
    el.textContent=e.message||"조회 실패";
    el.classList.remove("hidden");
  }
  btn.disabled=false; btn.textContent="시장 데이터";
}

// ── 탭 전환 ─────────────────────────────────────────────────
var currentTab = "signal";
function switchTab(id, el){
  currentTab = id;
  ["signal","holdings","action","portfolio"].forEach(function(t){
    document.getElementById("tab-"+t).classList.toggle("hidden", t!==id);
  });
  document.querySelectorAll(".tab").forEach(function(b){ b.classList.remove("active"); });
  el.classList.add("active");
  renderAll();
}

// ── 렌더링 ──────────────────────────────────────────────────
var _renderTimer = null;
function debounceRender() {
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(function(){ renderAll(); }, 400);
}

function renderAll(){
  var rs = state.manualRS!==null ? state.manualRS : calcRS(state.qqqDD,state.vix,state.vixRising,state.mom,state.below200);
  var cfg = RS_CONFIGS[rs];
  var tw  = calcWeights(cfg);
  var total = getTotalValue();

  if(currentTab==="signal") renderSignal(rs,cfg);
  if(currentTab==="holdings") renderHoldings(cfg,tw,total);
  if(currentTab==="action") renderAction(rs,cfg,tw,total);
  if(currentTab==="portfolio") renderPortfolio(rs,cfg,tw,total);
}

function renderHoldings(cfg,tw,total){

  window._updateQty = function(ticker, el) {
    state.quantities[ticker] = parseFloat(el.value) || 0;
    save();
    var price = state.prices[ticker] || 0;
    var val = state.quantities[ticker] * price;
    var sibling = el.nextElementSibling;
    if (sibling) {
      sibling.textContent = val > 0 ? fmt(val) : "-";
      sibling.style.color = val > 0 ? "#34d399" : "#475569";

  var rows = ALL_TICKERS.map(function(t){

function renderAction(rs,cfg,tw,total){
  var tv = total>0 ? total+state.dca : 50000;
  var items = Object.entries(tw).map(function(e){
    var t=e[0],tww=e[1];
    var held = getHoldingValue(t);
    var curP = total>0 ? held/tv : tww;
    var gap  = tww-curP;
    var buy  = total>0 ? Math.max(0,Math.min(gap*tv,state.dca*tww)) : Math.round(tww*state.dca);
    return {t:t,tw:tww,held:held,gap:gap,buy:buy};
  }).sort(function(a,b){return b.gap-a.gap;});

  var rows = items.map(function(a,i){
    var pc=portColor(a.t);
    var isHigh=a.gap>0.03, isOver=a.gap<-0.02;
    var buyShow=Math.round(a.buy*100)/100;
    var barW = Math.min(Math.abs(a.gap)/0.05*100,100);
    return [
      '<div style="display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:8px;',
        'background:'+(isHigh?"#0a1628":isOver?"#1a0808":"#060d1c")+';',
        'border:'+(isHigh?"1px solid #1e3a5f":isOver?"1px solid #7f1d1d30":"1px solid transparent")+'">',
        '<div style="color:#64748b;font-size:9px;width:18px;">'+(i+1)+'</div>',
        '<div style="color:'+pc+';font-weight:700;font-size:13px;width:44px;">'+a.t+'</div>',
        '<div style="flex:1;">',
          '<div style="background:#0f2d4a;border-radius:3px;height:3px;">',
            '<div style="background:'+(isOver?"#f87171":pc)+';border-radius:3px;height:3px;width:'+barW+'%;"></div>',
          '</div>',
          '<div style="color:'+(isOver?"#f87171":isHigh?"#fbbf24":"#64748b")+';font-size:8px;margin-top:2px;">',
            (a.gap>0?"부족 ":"초과 ")+(Math.abs(a.gap)*100).toFixed(1)+'%p',
          '</div>',
        '</div>',
        (total>0?'<div style="color:#64748b;font-size:10px;width:54px;text-align:right;">'+fmt(a.held)+'</div>':""),
        '<div style="color:#94a3b8;font-size:9px;width:38px;text-align:right;">'+(a.tw*100).toFixed(1)+'%</div>',
        '<div style="color:'+(isOver?"#f87171":buyShow>0?"#f1f5f9":"#64748b")+';font-size:12px;font-weight:700;width:58px;text-align:right;">',
          (isOver?"HOLD":buyShow>0?fmt(buyShow):"-"),
        '</div>',
      '</div>'
    ].join("");
  }).join("");

  document.getElementById("tab-action").innerHTML = [
    '<div class="card" style="border-color:'+cfg.color+'40;display:flex;align-items:center;gap:12px;">',
      '<div style="font-size:30px;font-weight:700;color:'+cfg.color+';">'+rs+'</div>',
      '<div>',
        '<div style="color:'+cfg.color+';font-weight:700;font-size:14px;">riskScore '+cfg.label+'</div>',
        '<div style="color:#94a3b8;font-size:10px;">P1 '+(cfg.w1*100).toFixed(0)+'% P2 '+(cfg.w2*100).toFixed(0)+'% P3 '+(cfg.w3*100).toFixed(0)+'%</div>',
      '</div>',
      '<div style="margin-left:auto;text-align:right;">',
        '<div style="color:#94a3b8;font-size:12px;font-weight:700;">DCA $'+state.dca+'</div>',
        '<div style="color:#64748b;font-size:10px;">총자산 '+(total>0?fmt(total):"미입력")+'</div>',
      '</div>',
    '</div>',
    (total===0?'<div style="background:#0d1a0d;border:1px solid #14532d40;border-radius:10px;padding:10px;color:#94a3b8;font-size:11px;margin-bottom:10px;">잔고 탭에서 수량을 입력하면 더 정확한 매매 계획을 볼 수 있어요.</div>':""),
    '<div class="card">',
      '<div class="label">WEEKLY BUY PLAN</div>',
      '<div style="color:#64748b;font-size:10px;margin-bottom:10px;">'+(total>0?"잔고 기반 — 목표비중 부족분 우선 매수":"목표비중 기반 — DCA 단순 배분")+'</div>',
      '<div style="display:flex;gap:6px;padding:3px 10px;margin-bottom:4px;">',
        '<div style="color:#64748b;font-size:9px;width:18px;">#</div>',
        '<div style="color:#64748b;font-size:9px;width:44px;">종목</div>',
        '<div style="color:#64748b;font-size:9px;flex:1;">비중갭</div>',
        (total>0?'<div style="color:#64748b;font-size:9px;width:54px;text-align:right;">현재</div>':""),
        '<div style="color:#64748b;font-size:9px;width:38px;text-align:right;">목표</div>',
        '<div style="color:#64748b;font-size:9px;width:58px;text-align:right;">매수금액</div>',
      '</div>',
      '<div style="display:flex;flex-direction:column;gap:3px;">'+rows+'</div>',
      '<div style="margin-top:12px;padding:10px;background:#0a1f18;border:1px solid #14532d;border-radius:10px;">',
        '<div style="color:#34d399;font-size:12px;font-weight:700;margin-bottom:5px;">매매 방법</div>',
        '<div style="color:#94a3b8;font-size:11px;line-height:2;">1. 토스증권 앱 열기<br>2. 종목 검색 후 구매 금액 주문 선택<br>3. 위 금액 입력 후 매수 (소수점 자동)<br>4. 매수 후 잔고 탭 수량 업데이트</div>',
      '</div>',
    '</div>',
  ].join("");
}

function renderPortfolio(rs,cfg,tw,total){
  var sorted = Object.entries(tw).sort(function(a,b){return b[1]-a[1];});
  var ports  = [PORT1,PORT2,PORT3];
  var pws    = [cfg.w1,cfg.w2,cfg.w3];
  var pclrs  = ["#38bdf8","#fb923c","#c084fc"];

  var weightRows = sorted.map(function(e){
    var t=e[0],w=e[1],pc=portColor(t);
    return [
      '<div style="display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;background:#060d1c;">',
        '<div style="color:'+pc+';font-weight:700;font-size:11px;width:36px;">'+t+'</div>',
        '<div style="flex:1;background:#0f2d4a;border-radius:3px;height:4px;">',
          '<div style="background:'+pc+';border-radius:3px;height:4px;width:'+Math.min(w/0.25*100,100)+'%;"></div>',
        '</div>',
        '<div style="color:#94a3b8;font-size:11px;width:34px;text-align:right;">'+(w*100).toFixed(1)+'%</div>',
        '<div style="color:#64748b;font-size:9px;width:48px;text-align:right;">'+(total>0?fmt(total*w):"-")+'</div>',
      '</div>'
    ].join("");
  }).join("");

  var portCards = ports.map(function(port,pi){
    var chips = port.assets.map(function(a){
      return [
        '<div style="background:#060d1c;border-radius:6px;padding:3px 8px;border:1px solid #0f2d4a;">',
          '<span style="color:'+pclrs[pi]+';font-size:11px;font-weight:700;">'+a.t+'</span>',
          '<span style="color:#94a3b8;font-size:9px;margin-left:4px;">'+(a.w*100).toFixed(0)+'%</span>',
          (total>0?'<span style="color:#64748b;font-size:9px;margin-left:3px;">'+fmt(total*pws[pi]*a.w)+'</span>':""),
        '</div>'
      ].join("");
    }).join("");
    return [
      '<div class="card" style="border-color:'+pclrs[pi]+'30;">',
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">',
          '<div style="color:'+pclrs[pi]+';font-weight:700;font-size:14px;">'+port.short+' '+port.name+'</div>',
          '<div style="color:'+pclrs[pi]+';font-size:12px;font-weight:700;">'+(pws[pi]*100).toFixed(0)+'% = '+(total>0?fmt(total*pws[pi]):"-")+'</div>',
        '</div>',
        '<div style="display:flex;flex-wrap:wrap;gap:4px;">'+chips+'</div>',
      '</div>'
    ].join("");
  }).join("");

  document.getElementById("tab-portfolio").innerHTML = [
    '<div class="card">',
      '<div class="label">TARGET WEIGHTS — riskScore '+rs+' 기준</div>',
      '<div class="grid2" style="gap:3px;">'+weightRows+'</div>',
    '</div>',
    portCards
  ].join("");
}

function recordDiv(){
  var amt = parseFloat(document.getElementById("divAmt").value);
  if(!amt||amt<=0) return;
  state.dividendsYtd += amt;
  document.getElementById("divAmt").value="";
  save(); renderAll();
}

// ── 초기화 ──────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", function() {
  load();
  renderAll();
});
</script>
