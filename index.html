<script>

];
var ALL_TICKERS = ["QQQM","SPYM","GLDM","MOAT","QUAL","SCHG","MTUM",

// ── Google Sheets URL (배포 후 여기에 입력) ──────────────────
var GS_URL = ""; // 예: "https://script.google.com/macros/s/XXXXX/exec"

// ── 앱 상태 ───────────────────────────────────────────────────
var state = {
  qqqDD:8, vix:18, vixRising:false, mom:2, below200:false, ma200:0, qqqPrice:0,
  manualRS:null, dca:200,
  quantities:{},   // 보유 수량 (소수점)
  prices:{},       // ETF 현재가 캐시 (시장 데이터 조회 시 업데이트)
  dividendsYtd:0
};

// 평가금액 계산: 수량 × 현재가
function getHoldingValue(ticker) {
  var qty = state.quantities[ticker] || 0;
  var price = state.prices[ticker] || 0;
  return qty * price;
}
function getTotalValue() {
  return ALL_TICKERS.reduce(function(sum, t){ return sum + getHoldingValue(t); }, 0);
}

var syncStatus = { msg: "", type: "" }; // ok / err / ing

function setSyncStatus(type, msg) {
  syncStatus = { type: type, msg: msg };
  var el = document.getElementById("sync-msg");
  if (!el) return;
  el.textContent = msg;
  el.style.color = type === "ok" ? "#34d399" : type === "err" ? "#f87171" : "#fbbf24";
  el.style.display = msg ? "block" : "none";
}

function save() {
  try { localStorage.setItem("toss-v3", JSON.stringify({
    quantities:state.quantities, prices:state.prices,
    dca:state.dca, dividendsYtd:state.dividendsYtd,
    qqqDD:state.qqqDD, vix:state.vix, vixRising:state.vixRising,
    mom:state.mom, below200:state.below200, ma200:state.ma200, qqqPrice:state.qqqPrice, manualRS:state.manualRS
  })); } catch(e){}
}

// ── 수익률 히스토리 (로컬 캐시) ─────────────────────────────
var perfHistory = []; // [{date,totalInv,totalVal,qqqPrice,ret,qqqRet}]

function loadPerfHistory() {
  try { perfHistory = JSON.parse(localStorage.getItem("toss-perf")||"[]"); } catch(e){ perfHistory=[]; }
}
function savePerfHistory() {
  try { localStorage.setItem("toss-perf", JSON.stringify(perfHistory)); } catch(e){}
}

// 명시적 저장 (버튼 클릭 시) - 실제 응답 확인
async function saveToSheet() {
  save(); // localStorage

  // ── 스냅샷 기록 ──────────────────────────────────────────
  var total = getTotalValue();
  var qqqP  = state.qqqPrice || 0;
  if(total > 0 && qqqP > 0) {
    var today = new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\. /g,"-").replace(".","-").replace(/\.$/, "");
    // 같은 날 중복 저장 방지 (마지막 항목 날짜 비교)
    var last = perfHistory[perfHistory.length-1];
    // 투입원금: 직전 스냅샷 없으면 현재 평가금액을 기준으로, 있으면 직전+DCA
    var totalInv = last ? (last.totalInv + state.dca) : total;
    var baseQqq  = last ? last.qqqPrice : qqqP; // QQQ 기준가 (첫 스냅샷)
    var snap = {
      date:     today,
      totalInv: Math.round(totalInv * 100) / 100,
      totalVal: Math.round(total * 100) / 100,
      qqqPrice: qqqP,
      ret:      last ? +((total / last.totalVal - 1) * 100).toFixed(2) : 0,
      qqqRet:   last ? +((qqqP  / last.qqqPrice - 1) * 100).toFixed(2) : 0,
      retCum:   +((total / totalInv - 1) * 100).toFixed(2),
      qqqRetCum:+((qqqP  / (perfHistory[0]?.qqqPrice||qqqP) - 1) * 100).toFixed(2),
    };
    if(last && last.date === today) {
      // 같은 날 저장 시 덮어쓰기
      perfHistory[perfHistory.length-1] = snap;
    } else {
      perfHistory.push(snap);
    }
    savePerfHistory();
  }

  setSyncStatus("ing", "저장 중...");
  try {
    var res = await fetch("/.netlify/functions/gs", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        quantities:   state.quantities,
        prices:       state.prices,
        dca:          state.dca,
        dividendsYtd: state.dividendsYtd,
        qqqDD:        state.qqqDD,
        vix:          state.vix,
        vixRising:    state.vixRising,
        mom:          state.mom,
        below200:     state.below200,
        manualRS:     state.manualRS,
        // 히스토리도 함께 저장
        perfHistory:  JSON.stringify(perfHistory),
      })
    });
    var text = await res.text();
    var json;
    try { json = JSON.parse(text); } catch(e) {
      throw new Error("응답 파싱 실패: " + text.slice(0,80));
    }
    if (json.ok) {
      var now = new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
      setSyncStatus("ok", "✓ " + now + " 저장 완료 (스냅샷 "+perfHistory.length+"개)");
      if(currentTab==="perf") renderPerf(getTotalValue());
    } else {
      throw new Error(json.error || "저장 실패");
    }
  } catch(e) {
    setSyncStatus("err", "저장 실패: " + e.message);
  }
}
function load() {
  try {
    var d = JSON.parse(localStorage.getItem("toss-v3")||"{}");
    if(d.quantities)   state.quantities   = d.quantities;
    if(d.prices)       state.prices       = d.prices;
    if(d.dca)          state.dca          = d.dca;
    if(d.dividendsYtd) state.dividendsYtd = d.dividendsYtd;
    if(d.qqqDD  !== undefined) state.qqqDD     = d.qqqDD;
    if(d.vix    !== undefined) state.vix       = d.vix;
    if(d.vixRising !== undefined) state.vixRising = d.vixRising;
    if(d.mom    !== undefined) state.mom       = d.mom;
    if(d.below200  !== undefined) state.below200  = d.below200;
    if(d.ma200     !== undefined) state.ma200     = d.ma200;
    if(d.qqqPrice  !== undefined) state.qqqPrice  = d.qqqPrice;
    if(d.manualRS  !== undefined) state.manualRS  = d.manualRS;
  } catch(e){}
}

// ── Google Sheets 저장 (내부용 - 응답 무시) ──────────────────
function gsSave() { /* saveToSheet()로 대체됨 */ }

// ── Google Sheets 불러오기 ────────────────────────────────────
async function gsLoad() {
  setSyncStatus("ing", "시트에서 불러오는 중...");
  try {
    var res  = await fetch("/.netlify/functions/gs?action=read");
    var json = await res.json();
    if (!json.ok) throw new Error(json.error || "응답 오류");
    var d = json.data;
    if (d.quantities)            state.quantities   = d.quantities;
    if (d.prices)                state.prices       = d.prices;
    if (d.dca)                   state.dca          = d.dca;
    if (d.dividendsYtd)          state.dividendsYtd = d.dividendsYtd;
    if (d.qqqDD  !== undefined)  state.qqqDD        = d.qqqDD;
    if (d.vix    !== undefined)  state.vix          = d.vix;
    if (d.vixRising !== undefined) state.vixRising  = d.vixRising;
    if (d.mom      !== undefined) state.mom          = d.mom;
    if (d.below200 !== undefined) state.below200     = d.below200;
    if (d.manualRS !== undefined) state.manualRS     = d.manualRS;
    if (d.perfHistory) {
      try { perfHistory = JSON.parse(d.perfHistory); savePerfHistory(); } catch(e){}
    }
    // 로컬에도 저장
    try { localStorage.setItem("toss-v3", JSON.stringify(d)); } catch(e){}
    var now = new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
    setSyncStatus("ok", "✓ " + now + " 불러오기 완료");
    renderAll();
  } catch(e) {
    setSyncStatus("err", "불러오기 실패: " + e.message);
  }
}

// ── 계단식 DCA (총자산 구간별 고정 금액) ─────────────────────
var DCA_STEPS = [
  { below: 10000,  dca:  50 },
  { below: 30000,  dca: 100 },
  { below: 60000,  dca: 200 },
  { below: 100000, dca: 300 },
  { below: 150000, dca: 500 },
  { below: 250000, dca: 700 },
  { below: 400000, dca:1000 },
  { below: Infinity,dca:1500 },
];
function calcStepDCA(total) {
  if (!total || total <= 0) return state.dca; // 미입력 시 수동값 유지
  for (var i = 0; i < DCA_STEPS.length; i++) {
    if (total < DCA_STEPS[i].below) return DCA_STEPS[i].dca;
  }
  return 1500;
}

// ── 드리프트 임계값 ───────────────────────────────────────────
var DRIFT_TRIM = 0.05;  // 목표 대비 +5%p 초과 → TRIM
var DRIFT_ADD  = 0.05;  // 목표 대비 −5%p 부족 → ADD 우선

function calcRS(dd,vix,rising,mom,below200){
  var s=0;
  if(dd>20)s+=2; else if(dd>12)s+=1;
  if(vix>28)s+=1; else if(vix>22)s+=0.5;
  if(rising)s+=0.5;
  if(mom<-6)s+=1; else if(mom<-3)s+=0.5;
  if(vix>25&&dd>12)s+=1;
  if(below200)s+=0.5;
  if(below200&&dd>8)s+=0.5;
  return Math.min(4,Math.round(s));
}
function calcWeights(cfg){
  var w={};
  [[PORT1,cfg.w1],[PORT2,cfg.w2],[PORT3,cfg.w3]].forEach(function(p){
    p[0].assets.forEach(function(a){ w[a.t]=(w[a.t]||0)+p[1]*a.w; });
  });
  return w;
}
function fmt(v){
  if(v>=1e6) return "$"+(v/1e6).toFixed(2)+"M";
  if(v>=1000) return "$"+(v/1000).toFixed(1)+"K";
  if(v>=1) return "$"+v.toFixed(2);
  return "$"+v.toFixed(4);
}
function portColor(t){
  if(PORT1.assets.find(function(a){return a.t===t;})) return "#38bdf8";
  if(PORT2.assets.find(function(a){return a.t===t;})) return "#fb923c";
  return "#c084fc";
}

// ── Yahoo Finance 직접 호출 ────────────────────────────────────
// corsproxy.io 는 HTML 파일을 직접 로컬/서버에서 열 때 작동
// claude.ai 환경에서는 막힐 수 있음 → 사용자가 로컬 파일로 실행해야 함
async function yahooQuote(symbol) {
  // Netlify Function 프록시 경유 → CORS 문제 없음
  var urls = [
    "/.netlify/functions/yahoo?symbol=" + encodeURIComponent(symbol),
    // 폴백: allorigins
    "https://api.allorigins.win/get?url=" + encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+symbol+"?interval=1d&range=1y"),
  ];
  var lastErr;
  for(var i=0;i<urls.length;i++){
    try{
      var res = await fetch(urls[i]);
      if(!res.ok) throw new Error("HTTP "+res.status);
      var text = await res.text();
      var raw;
      try{
        var maybe = JSON.parse(text);
        raw = maybe.contents ? JSON.parse(maybe.contents) : maybe;
      } catch(e){ throw new Error("JSON 파싱 실패: "+text.slice(0,60)); }
      if(!raw.chart||!raw.chart.result||!raw.chart.result[0]) throw new Error("데이터 없음");
      var meta   = raw.chart.result[0].meta;
      var closes = raw.chart.result[0].indicators.quote[0].close.filter(function(v){return v!=null;});
      return {meta:meta, closes:closes};
    } catch(e){ lastErr=e; }
  }
  throw new Error("Yahoo 조회 실패: "+lastErr.message);
}

async function fetchMarketData(){
  // QQQ, VIX, ETF 17개 병렬 조회
  var etfSymbols = ALL_TICKERS.map(function(t){
    // QQQM은 Yahoo에서 그대로, 나머지도 동일
    return t;
  });
  var allSymbols = ["QQQ", "%5EVIX"].concat(etfSymbols);
  var results = await Promise.all(allSymbols.map(function(s){
    return yahooQuote(s).catch(function(e){ return null; }); // 개별 실패 허용
  }));
  var qqqData = results[0];
  var vixData = results[1];
  if(!qqqData) throw new Error("QQQ 조회 실패");
  if(!vixData) throw new Error("VIX 조회 실패");
  // ETF 현재가 추출 (실패한 종목은 기존 캐시 유지)
  var etfPrices = Object.assign({}, state.prices); // 기존 캐시 기반
  etfSymbols.forEach(function(t, i){
    var d = results[2 + i];
    if(d && d.meta) etfPrices[t] = +(d.meta.regularMarketPrice || d.closes[d.closes.length-1]).toFixed(4);
  });
  var qqqC = qqqData.closes, vixC = vixData.closes;
  var qqqPrice   = qqqData.meta.regularMarketPrice || qqqC[qqqC.length-1];
  var qqqHigh52w = Math.max.apply(null,qqqC);
  // VIX: closes 배열의 마지막 값을 현재가로 사용 (일관성 보장)
  var vix = vixC[vixC.length-1];

  // VIX 방향: 백테스트와 동일하게 4주MA(20일) vs 8주MA(40일) 비교
  var vix4w = vixC.slice(-20);
  var vix8w = vixC.slice(-40);
  var vix4ma = vix4w.reduce(function(a,b){return a+b;},0) / vix4w.length;
  var vix8ma = vix8w.reduce(function(a,b){return a+b;},0) / vix8w.length;
  var vixTrend = vix4ma > vix8ma * 1.08 ? "rising" : vix4ma < vix8ma * 0.92 ? "falling" : "stable";
  var vix5dAgoVal = vixC.length >= 6 ? vixC[vixC.length-6] : vixC[0]; // 디버그 표시용

  // 12주(약 60거래일) 수익률
  var idx60 = Math.max(0,qqqC.length-61);
  var p60   = qqqC[idx60];
  var mom12w = p60 ? +((qqqPrice/p60-1)*100).toFixed(2) : 0;

  var qqqDD = +Math.max(0,(qqqHigh52w-qqqPrice)/qqqHigh52w*100).toFixed(1);
  var now   = new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});

  return {
    qqqPrice:+qqqPrice.toFixed(2), qqqHigh52w:+qqqHigh52w.toFixed(2),
    qqqDD:qqqDD, vix:+vix.toFixed(1), qqq12wReturn:mom12w,
    vix5dAgo:+vix5dAgoVal.toFixed(1),
    qqq3mAgo:+p60.toFixed(2), mom12wValid:true,
    vixTrend:vixTrend, fetchedAt:now,
    etfPrices:etfPrices,
    // 200일선: 종가 배열 최근 200개 평균 (장중엔 qqqPrice로 비교)
    below200: (function(){
      if(qqqC.length < 20) return false; // 데이터 부족
      var n = Math.min(200, qqqC.length);
      var ma200 = qqqC.slice(-n).reduce(function(a,b){return a+b;},0) / n;
      return qqqPrice < ma200 * 0.98;
    })(),
    ma200: (function(){
      var n = Math.min(200, qqqC.length);
      return +(qqqC.slice(-n).reduce(function(a,b){return a+b;},0) / n).toFixed(2);
    })(),
    qqqDataLen: qqqC.length,
    note:"QQQ $"+Math.round(qqqPrice)+" | 낙폭 "+qqqDD+"% | VIX "+vix.toFixed(1)+"("+vixTrend+") | 12w "+(mom12w>=0?"+":"")+mom12w+"%" + (qqqPrice < (qqqC.slice(-Math.min(200,qqqC.length)).reduce(function(a,b){return a+b;},0)/Math.min(200,qqqC.length))*0.98?" | 200선↓":""),
  };
}

// ── 시장 데이터 불러오기 ──────────────────────────────────────
async function handleFetch(){
  var btn = document.getElementById("fetchBtn");
  btn.disabled=true; btn.textContent="조회 중...";
  document.getElementById("fetch-err").classList.add("hidden");
  document.getElementById("fetch-ok").classList.add("hidden");
  try{
    var d = await fetchMarketData();
    state.qqqDD    = d.qqqDD;
    state.vix      = d.vix;
    state.vixRising= d.vixTrend==="rising";
    state.mom      = d.qqq12wReturn;
    state.below200 = d.below200 || false;
    state.ma200    = d.ma200 || 0;
    state.qqqPrice = d.qqqPrice || 0;
    state.manualRS = null;
    if(d.etfPrices) state.prices = d.etfPrices;
    save();

    // 조회 결과 표시
    document.getElementById("ok-time").textContent = "✓ "+d.fetchedAt+" 조회완료";
    document.getElementById("ok-note").textContent = d.note;
    var debugItems = [
      {k:"QQQ현재가", v:"$"+d.qqqPrice},
      {k:"52주고점",  v:"$"+d.qqqHigh52w},
      {k:"낙폭",      v:d.qqqDD+"%"},
      {k:"VIX",       v:d.vix},
      {k:"VIX방향",   v:d.vixTrend},
      {k:"VIX5일전",  v:d.vix5dAgo||"-"},
      {k:"3개월전QQQ",v:"$"+d.qqq3mAgo},
      {k:"12w수익률", v:(d.qqq12wReturn>=0?"+":"")+d.qqq12wReturn+"%"},
      {k:"200일선MA", v:d.ma200?"$"+d.ma200:"-"},
      {k:"200선하회", v:d.below200?"✅하회":"❌상회"},
      {k:"데이터수", v:d.qqqDataLen+"일"},
    ];
    document.getElementById("debug-row").innerHTML = debugItems.map(function(i){
      return '<div class="debug-cell"><div class="debug-k">'+i.k+'</div><div class="debug-v">'+i.v+'</div></div>';
    }).join("");
    document.getElementById("fetch-ok").classList.remove("hidden");
    renderAll();
  } catch(e){
    var el=document.getElementById("fetch-err");
    el.textContent=e.message||"조회 실패";
    el.classList.remove("hidden");
  }
  btn.disabled=false; btn.textContent="시장 데이터";
}

// ── 탭 전환 ─────────────────────────────────────────────────
var currentTab = "signal";
function switchTab(id, el){
  currentTab = id;
  ["signal","holdings","action","portfolio","perf"].forEach(function(t){
    document.getElementById("tab-"+t).classList.toggle("hidden", t!==id);
  });
  document.querySelectorAll(".tab").forEach(function(b){ b.classList.remove("active"); });
  el.classList.add("active");
  renderAll();
}

// ── 렌더링 ──────────────────────────────────────────────────
var _renderTimer = null;
function debounceRender() {
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(function(){ renderAll(); }, 400);
}

function renderAll(){
  var rs = state.manualRS!==null ? state.manualRS : calcRS(state.qqqDD,state.vix,state.vixRising,state.mom,state.below200);
  var cfg = RS_CONFIGS[rs];
  var tw  = calcWeights(cfg);
  var total = getTotalValue();

  if(currentTab==="signal") renderSignal(rs,cfg);
  if(currentTab==="holdings") renderHoldings(cfg,tw,total);
  if(currentTab==="action") renderAction(rs,cfg,tw,total);
  if(currentTab==="portfolio") renderPortfolio(rs,cfg,tw,total);
  if(currentTab==="perf") renderPerf(total);
}

function renderAction(rs,cfg,tw,total){
  var effectiveDCA = calcStepDCA(total);
  var tv = total>0 ? total+effectiveDCA : 50000;

  var items = Object.entries(tw).map(function(e){
    var t=e[0],tww=e[1];
    var held   = getHoldingValue(t);
    var curPct = total>0 ? held/total : tww; // 현재 비중 (total 기준)
    var gap    = tww - curPct;               // 목표 대비 차이 (+부족/-초과)

    // 드리프트 판단 (잔고 있을 때만)
    var drift = total>0 ? curPct - tww : 0;
    var isTrim = drift >  DRIFT_TRIM;   // 5%p 초과 → TRIM
    var isAdd  = gap   >  DRIFT_ADD;    // 5%p 부족 → ADD 우선

    // 매수 금액: TRIM 종목은 0, ADD 종목은 DCA 우선 배분
    var buy = 0;
    if (isTrim) {
      buy = 0; // 매수 없음, TRIM 신호
    } else {
      buy = total>0
        ? Math.max(0, Math.min(gap * tv, effectiveDCA * tww))
        : Math.round(tww * effectiveDCA);
    }

    // TRIM 금액: 초과분 중 버퍼(2%p) 남기고 매도
    var trimAmt = 0;
    if (isTrim && total>0) {
      var excessPct = drift - 0.02; // 2%p 버퍼 남김
      trimAmt = Math.round(excessPct * total * 100) / 100;
    }

    return {t:t, tw:tww, held:held, gap:gap, curPct:curPct,
            buy:buy, isTrim:isTrim, isAdd:isAdd, trimAmt:trimAmt, drift:drift};
  }).sort(function(a,b){
    // TRIM 항목 맨 위, 그 다음 gap 큰 순
    if (a.isTrim && !b.isTrim) return -1;
    if (!a.isTrim && b.isTrim) return 1;
    return b.gap - a.gap;
  });

  var rows = items.map(function(a,i){
    var pc = portColor(a.t);
    var buyShow = Math.round(a.buy*100)/100;
    if (buyShow < 1) buyShow = 0;

    var bgColor, borderColor, gapColor, actionColor, actionLabel;

    if (a.isTrim) {
      bgColor     = "#1a0d00";
      borderColor = "1px solid #92400e60";
      gapColor    = "#fbbf24";
      actionColor = "#fbbf24";
      actionLabel = "TRIM<br><span style='font-size:10px;color:#fbbf24;'>-"+fmt(a.trimAmt)+"</span>";
    } else if (a.isAdd) {
      bgColor     = "#0a1628";
      borderColor = "1px solid #1e3a5f";
      gapColor    = "#38bdf8";
      actionColor = "#f1f5f9";
      actionLabel = buyShow>0 ? fmt(buyShow) : "-";
    } else if (a.gap < -0.02) {
      bgColor     = "#1a0808";
      borderColor = "1px solid #7f1d1d30";
      gapColor    = "#f87171";
      actionColor = "#64748b";
      actionLabel = "HOLD";
    } else {
      bgColor     = "#060d1c";
      borderColor = "1px solid transparent";
      gapColor    = "#64748b";
      actionColor = buyShow>0 ? "#f1f5f9" : "#64748b";
      actionLabel = buyShow>0 ? fmt(buyShow) : "-";
    }

    var barW  = Math.min(Math.abs(a.isTrim ? a.drift : a.gap)/0.05*100, 100);
    var barC  = a.isTrim ? "#fbbf24" : (a.gap<-0.02 ? "#f87171" : pc);
    var gapLabel = a.isTrim
      ? "초과 "+(a.drift*100).toFixed(1)+"%p → TRIM"
      : (a.gap>0?"부족 ":"초과 ")+(Math.abs(a.gap)*100).toFixed(1)+"%p";

    return [
      '<div style="display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:8px;',
        'background:'+bgColor+';border:'+borderColor+';">',
        '<div style="color:#64748b;font-size:9px;width:18px;">'+(i+1)+'</div>',
        '<div style="color:'+pc+';font-weight:700;font-size:13px;width:44px;">'+a.t+'</div>',
        '<div style="flex:1;">',
          '<div style="background:#0f2d4a;border-radius:3px;height:3px;">',
            '<div style="background:'+barC+';border-radius:3px;height:3px;width:'+barW+'%;"></div>',
          '</div>',
          '<div style="color:'+gapColor+';font-size:8px;margin-top:2px;">'+gapLabel+'</div>',
        '</div>',
        (total>0?'<div style="color:#64748b;font-size:10px;width:54px;text-align:right;">'+fmt(a.held)+'</div>':""),
        '<div style="color:#94a3b8;font-size:9px;width:38px;text-align:right;">'+(a.tw*100).toFixed(1)+'%</div>',
        '<div style="color:'+actionColor+';font-size:12px;font-weight:700;width:58px;text-align:right;line-height:1.4;">'+actionLabel+'</div>',
      '</div>'
    ].join("");
  }).join("");

  var trimCount = items.filter(function(a){return a.isTrim;}).length;
  var trimTotal = items.reduce(function(s,a){return s+(a.isTrim?a.trimAmt:0);},0);
  var trimBanner = (trimCount>0 && total>0)
    ? '<div style="background:#1a0d00;border:1px solid #92400e;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;">'+
        '<div style="font-size:18px;">⚠️</div>'+
        '<div><div style="color:#fbbf24;font-size:12px;font-weight:700;">드리프트 TRIM 신호 '+trimCount+'종목</div>'+
        '<div style="color:#92400e;font-size:11px;">목표비중 +5%p 초과 → 합계 약 '+fmt(trimTotal)+' 매도 후 재배분 권장</div></div>'+
      '</div>'
    : '';

  document.getElementById("tab-action").innerHTML = [
    '<div class="card" style="border-color:'+cfg.color+'40;display:flex;align-items:center;gap:12px;">',
      '<div style="font-size:30px;font-weight:700;color:'+cfg.color+';">'+rs+'</div>',
      '<div>',
        '<div style="color:'+cfg.color+';font-weight:700;font-size:14px;">riskScore '+cfg.label+'</div>',
        '<div style="color:#94a3b8;font-size:10px;">P1 '+(cfg.w1*100).toFixed(0)+'% P2 '+(cfg.w2*100).toFixed(0)+'% P3 '+(cfg.w3*100).toFixed(0)+'%</div>',
      '</div>',
      '<div style="margin-left:auto;text-align:right;">',
        '<div style="color:#fb923c;font-size:12px;font-weight:700;">DCA $'+effectiveDCA+'</div>',
        (total>0&&effectiveDCA!==state.dca?'<div style="color:#64748b;font-size:9px;">자산구간 자동 적용 (수동: $'+state.dca+')</div>':""),
        '<div style="color:#64748b;font-size:10px;">총자산 '+(total>0?fmt(total):"미입력")+'</div>',
      '</div>',
    '</div>',
    trimBanner,
    (total===0?'<div style="background:#0d1a0d;border:1px solid #14532d40;border-radius:10px;padding:10px;color:#94a3b8;font-size:11px;margin-bottom:10px;">잔고 탭에서 수량을 입력하면 더 정확한 매매 계획을 볼 수 있어요.</div>':""),
    '<div class="card">',
      '<div class="label">WEEKLY BUY PLAN</div>',
      '<div style="color:#64748b;font-size:10px;margin-bottom:10px;">'+(total>0?"잔고 기반 — TRIM 우선, 목표비중 부족분 매수":"목표비중 기반 — DCA 단순 배분")+'</div>',
      '<div style="display:flex;gap:6px;padding:3px 10px;margin-bottom:4px;">',
        '<div style="color:#64748b;font-size:9px;width:18px;">#</div>',
        '<div style="color:#64748b;font-size:9px;width:44px;">종목</div>',
        '<div style="color:#64748b;font-size:9px;flex:1;">비중갭</div>',
        (total>0?'<div style="color:#64748b;font-size:9px;width:54px;text-align:right;">현재</div>':""),
        '<div style="color:#64748b;font-size:9px;width:38px;text-align:right;">목표</div>',
        '<div style="color:#64748b;font-size:9px;width:58px;text-align:right;">매수금액</div>',
      '</div>',
      '<div style="display:flex;flex-direction:column;gap:3px;">'+rows+'</div>',
      '<div style="margin-top:12px;padding:10px;background:#0a1f18;border:1px solid #14532d;border-radius:10px;">',
        '<div style="color:#34d399;font-size:12px;font-weight:700;margin-bottom:5px;">매매 방법</div>',
        '<div style="color:#94a3b8;font-size:11px;line-height:2;">1. 토스증권 앱 열기<br>2. 종목 검색 후 구매 금액 주문 선택<br>3. 위 금액 입력 후 매수 (소수점 자동)<br>4. 매수 후 잔고 탭 수량 업데이트</div>',
      '</div>',
    '</div>',
  ].join("");
}

function renderPerf(total) {
  var h = perfHistory;
  var el = document.getElementById("tab-perf");

  // KPI
  var latestRet  = h.length ? h[h.length-1].retCum    : null;
  var latestQqq  = h.length ? h[h.length-1].qqqRetCum : null;
  var alpha      = (latestRet!==null && latestQqq!==null) ? (latestRet - latestQqq) : null;
  var weeks      = h.length;

  // MDD 계산
  var mdd = 0;
  if(h.length > 1) {
    var peak = h[0].totalVal;
    h.forEach(function(s){ if(s.totalVal>peak) peak=s.totalVal; var dd=(peak-s.totalVal)/peak*100; if(dd>mdd) mdd=dd; });
  }

  // KPI 카드
  var kpiHtml = [
    {l:"누적 수익률",  v: latestRet!==null  ? (latestRet>=0?"+":"")+latestRet.toFixed(2)+"%" : "--",  c: latestRet>=0?"#34d399":"#f87171"},
    {l:"QQQ 누적",    v: latestQqq!==null  ? (latestQqq>=0?"+":"")+latestQqq.toFixed(2)+"%" : "--",  c: "#94a3b8"},
    {l:"알파",         v: alpha!==null      ? (alpha>=0?"+":"")+alpha.toFixed(2)+"%p"        : "--",  c: alpha>=0?"#34d399":"#f87171"},
    {l:"MDD",          v: mdd>0 ? "-"+mdd.toFixed(1)+"%" : "--",                                       c: "#fbbf24"},
    {l:"스냅샷",       v: weeks+"주",                                                                   c: "#38bdf8"},
    {l:"현재 평가",    v: total>0 ? fmt(total) : "--",                                                  c: "#f1f5f9"},
  ].map(function(k){
    return '<div style="background:#060d1c;border-radius:10px;padding:10px;text-align:center;">'+
      '<div style="color:#64748b;font-size:9px;margin-bottom:4px;">'+k.l+'</div>'+
      '<div style="color:'+k.c+';font-size:16px;font-weight:700;">'+k.v+'</div>'+
    '</div>';
  }).join("");

  // SVG 차트 (라이브러리 없이 순수 SVG)
  var chartHtml = "";
  if(h.length >= 2) {
    var W=320, H=140, PL=36, PR=10, PT=10, PB=24;
    var cw=W-PL-PR, ch=H-PT-PB;
    var rets    = h.map(function(s){return s.retCum;});
    var qqqRets = h.map(function(s){return s.qqqRetCum;});
    var allVals = rets.concat(qqqRets);
    var minV = Math.min.apply(null,allVals), maxV = Math.max.apply(null,allVals);
    var pad  = Math.max(2, (maxV-minV)*0.1);
    minV -= pad; maxV += pad;
    var range = maxV - minV || 1;

    function toX(i){ return PL + (i/(h.length-1))*cw; }
    function toY(v){ return PT + ch - ((v-minV)/range)*ch; }

    function makePath(vals, color, dashed) {
      var d = vals.map(function(v,i){ return (i===0?"M":"L")+toX(i).toFixed(1)+","+toY(v).toFixed(1); }).join(" ");
      return '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="'+(dashed?"1.5":"2.5")+'" '+(dashed?'stroke-dasharray="4,3"':'')+' />';
    }
    // 영역 채우기 (포트)
    var areaD = rets.map(function(v,i){ return (i===0?"M":"L")+toX(i).toFixed(1)+","+toY(v).toFixed(1); }).join(" ")
      + " L"+toX(h.length-1).toFixed(1)+","+(PT+ch)+" L"+PL+","+(PT+ch)+" Z";

    // Y축 레이블
    var yTicks = [minV, (minV+maxV)/2, maxV].map(function(v){
      return '<text x="'+(PL-4)+'" y="'+toY(v).toFixed(1)+'" fill="#475569" font-size="8" text-anchor="end" dominant-baseline="middle">'+(v>=0?"+":"")+v.toFixed(0)+'%</text>';
    }).join("");

    // X축 레이블 (최대 6개)
    var step = Math.max(1, Math.floor(h.length/6));
    var xTicks = h.filter(function(_,i){ return i%step===0||i===h.length-1; }).map(function(s,_,arr){
      var i = h.indexOf(s);
      return '<text x="'+toX(i).toFixed(1)+'" y="'+(PT+ch+14)+'" fill="#475569" font-size="8" text-anchor="middle">'+s.date.slice(5)+'</text>';
    }).join("");

    // 0선
    var zeroY = toY(0);
    var zeroLine = (zeroY>=PT&&zeroY<=PT+ch) ? '<line x1="'+PL+'" y1="'+zeroY.toFixed(1)+'" x2="'+(PL+cw)+'" y2="'+zeroY.toFixed(1)+'" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="2,2"/>' : "";

    chartHtml = '<div style="overflow-x:auto;"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:'+W+'px;display:block;">'+
      '<rect width="'+W+'" height="'+H+'" fill="#060d1c" rx="8"/>'+
      zeroLine+
      '<path d="'+areaD+'" fill="#34d399" opacity="0.08"/>'+
      makePath(qqqRets,"#94a3b8",true)+
      makePath(rets,"#34d399",false)+
      yTicks+xTicks+
      // 범례
      '<line x1="'+(PL)+'" y1="'+(PT+ch+22)+'" x2="'+(PL+16)+'" y2="'+(PT+ch+22)+'" stroke="#34d399" stroke-width="2"/>'+
      '<text x="'+(PL+19)+'" y="'+(PT+ch+22)+'" fill="#34d399" font-size="8" dominant-baseline="middle">내 포트</text>'+
      '<line x1="'+(PL+60)+'" y1="'+(PT+ch+22)+'" x2="'+(PL+76)+'" y2="'+(PT+ch+22)+'" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>'+
      '<text x="'+(PL+79)+'" y="'+(PT+ch+22)+'" fill="#94a3b8" font-size="8" dominant-baseline="middle">QQQ</text>'+
    '</svg></div>';
  } else {
    chartHtml = '<div style="color:#475569;font-size:12px;text-align:center;padding:40px 0;">저장 버튼을 2회 이상 눌러야 차트가 표시됩니다.</div>';
  }

  // 테이블
  var tableRows = h.slice().reverse().map(function(s){
    var rc = s.ret>=0?"#34d399":"#f87171";
    var qc = s.qqqRet>=0?"#94a3b8":"#f87171";
    var ac = (s.retCum-s.qqqRetCum)>=0?"#34d399":"#f87171";
    return '<tr style="border-bottom:1px solid #0f2d4a20;">'+
      '<td style="padding:6px 8px;color:#64748b;font-size:10px;">'+s.date+'</td>'+
      '<td style="padding:6px 8px;color:#94a3b8;font-size:11px;text-align:right;">'+fmt(s.totalVal)+'</td>'+
      '<td style="padding:6px 8px;color:#64748b;font-size:11px;text-align:right;">'+fmt(s.totalInv)+'</td>'+
      '<td style="padding:6px 8px;color:'+rc+';font-size:11px;font-weight:700;text-align:right;">'+(s.ret>=0?"+":"")+s.ret.toFixed(1)+'%</td>'+
      '<td style="padding:6px 8px;color:'+qc+';font-size:11px;text-align:right;">'+(s.qqqRet>=0?"+":"")+s.qqqRet.toFixed(1)+'%</td>'+
      '<td style="padding:6px 8px;color:'+ac+';font-size:11px;font-weight:700;text-align:right;">'+(s.retCum>=0?"+":"")+s.retCum.toFixed(1)+'%</td>'+
    '</tr>';
  }).join("");

  el.innerHTML = [
    // KPI
    '<div class="card"><div class="label">PERFORMANCE SUMMARY</div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">'+kpiHtml+'</div>'+
    '</div>',
    // 차트
    '<div class="card"><div class="label">누적 수익률 추이</div>'+chartHtml+'</div>',
    // 테이블
    h.length > 0 ? [
      '<div class="card"><div class="label">주간 스냅샷 기록</div>',
      '<div style="overflow-x:auto;">',
      '<table style="width:100%;border-collapse:collapse;font-family:monospace;">',
      '<thead><tr>',
        ['날짜','평가금액','투입원금','주간수익','QQQ주간','누적수익'].map(function(h){
          return '<th style="padding:6px 8px;color:#475569;font-size:9px;text-align:right;border-bottom:1px solid #1e3a5f;font-weight:600;">'+h+'</th>';
        }).join(""),
      '</tr></thead>',
      '<tbody>'+tableRows+'</tbody>',
      '</table></div></div>',
    ].join("") : '<div class="card" style="color:#64748b;font-size:12px;text-align:center;padding:20px;">아직 기록이 없습니다.<br>시장 데이터 조회 후 💾 저장을 눌러주세요.</div>',
    // 초기화 버튼
    '<div style="text-align:right;margin-top:4px;">'+
      '<button onclick="if(confirm(\'수익률 기록을 모두 삭제할까요?\'))clearPerf()" style="padding:6px 12px;border-radius:8px;border:1px solid #7f1d1d;background:transparent;color:#f87171;font-family:monospace;font-size:11px;cursor:pointer;">🗑 기록 초기화</button>'+
    '</div>',
  ].join("");
}

function clearPerf() {
  perfHistory = [];
  savePerfHistory();
  renderAll();
}

// ── 초기화 ──────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", function() {
  load();
  loadPerfHistory();
  renderAll();
});
</script>
</body>
</html>
